{% extends 'authentification/base.html' %}

{% block content %}

    <div class="auth-container">
        <h1>LITRevu</h1>
        <h2>Connectez-vous</h2>
        <form action="" method="post" novalidate>
            {% csrf_token %}
            {{ user_form.as_p }}
            <button type="submit">Se connecter</button>
        </form>
        <h2>Inscrivez-vous maintenant</h2>
        <a href="{% url 'subscribe' %}">S'inscrire</a>
    </div>

    <div class="user-info">
        <h2>Utilisateur existants :</h2>
            <ul>
            {% for user in users %}
                <li>{{ user.username }}</li>
            {% endfor %}
            </ul>
    </div>

{% endblock %}
