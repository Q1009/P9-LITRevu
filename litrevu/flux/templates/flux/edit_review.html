{% extends 'base.html' %}

{% block content %}
    <h2>Modifier votre critique</h2>
    {% if edit_form.errors %}
        {{ edit_form.errors }}
        <p style="color: red;">Please correct the errors below.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ edit_form.as_p }}
        <button type="submit">Envoyer</button>
    </form>
{% endblock %}
