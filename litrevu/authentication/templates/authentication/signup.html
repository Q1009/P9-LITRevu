{% extends 'base.html' %}

{% block content %}
    <h2>Inscription</h2>
    {% if form.errors %}
        {{ form.errors }}
        <p style="color: red;">Please correct the errors below.</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="card-actions">
            <a href="{% url 'authentication:login' %}" class="btn">Retourner</a>
            <button type="submit">S'inscrire</button>
        </div>
    </form>
    
{% endblock %}
